name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check mathart/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Generate demo assets
        run: |
          mathart-palette generate --harmony warm_cool_shadow --count 8 --seed 42 -o /tmp/test_palette.json
          mathart-sdf spike -o /tmp/test_spike.png --size 32
          mathart-anim idle -o /tmp/test_idle.png --frames 8
          mathart-export --generate-demo --output-dir /tmp/demo_output
