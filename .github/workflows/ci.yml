name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check mathart/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pytest tests/ --cov=mathart --cov-report=term-missing

  # SESSION-041: Headless E2E Visual Regression Pipeline
  # Implements Gap 3 closure — hermetic sandbox cold-start, structural
  # manifest audit (Level 1), and SSIM visual regression (Level 2).
  # References: Skia Gold, OpenUSD Validation, Wang et al. 2004 SSIM.
  visual-regression:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI dependencies (includes scikit-image + OpenCV)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ci]"

      - name: Run headless E2E audit (Level 0 + Level 1 + Level 2)
        run: python -m mathart.headless_e2e_ci --strict

      - name: Run headless E2E pytest suite
        run: pytest mathart/headless_e2e_ci.py -v --tb=short

      - name: Upload diff heatmap on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: /tmp/umr_sandbox_*/diff_heatmap.png
          if-no-files-found: ignore
