name: Registry E2E Daily Guard

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

jobs:
  registry-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ci]"

      - name: Run registry-wide backend E2E guard
        run: python scripts/registry_e2e_guard.py --project-root . --output-dir artifacts/registry_e2e_guard --strict

      - name: Upload registry guard reports
        uses: actions/upload-artifact@v4
        with:
          name: registry-e2e-guard
          path: artifacts/registry_e2e_guard/
          if-no-files-found: error
