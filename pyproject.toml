[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mathart"
version = "0.32.0"
description = "MarioTrickster Math-Driven Art Pipeline — procedural pixel art generation via OKLAB color science, SDF effects, programmatic skeletal animation, WFC level generation, L-System plants, and knowledge distillation."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "Pillow>=10.0",
    "scipy>=1.11",
    "openai>=1.0.0",
    "requests>=2.31",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "ruff>=0.1",
]
ci = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "ruff>=0.1",
    "scikit-image>=0.22",
    "opencv-python-headless>=4.8",
]

[project.scripts]
mathart-palette = "mathart.oklab.cli:main"
mathart-sdf = "mathart.sdf.cli:main"
mathart-anim = "mathart.animation.cli:main"
mathart-export = "mathart.export.cli:main"
mathart-level = "mathart.level.cli:main"
mathart-distill = "mathart.distill.cli:main"
mathart-evolve = "mathart.evolution.cli:main"
mathart-mine = "mathart.evolution.paper_miner:_cli_entry"
mathart-ci-audit = "mathart.headless_e2e_ci:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow tests",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.setuptools.packages.find]
include = ["mathart*"]
